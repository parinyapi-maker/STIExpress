<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - STIExpress</title>
    
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="login-container">
        <h2>STIExpress</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน (Username)" required>
            <input type="password" id="password" placeholder="รหัสผ่าน (Password)" required>
            <button type="submit">เข้าสู่ระบบ</button>
        </form>
        <div id="message"></div>
    </div>

    <script src="../js/login.js"></script>

</body>
</html>
